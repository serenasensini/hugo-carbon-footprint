# hugo-carbon-footprint — English translations
# Used by layouts/partials/carbon-badge.html via Hugo's `i18n` function.

[carbon_aria_label]
other = "Carbon footprint of this site"

[carbon_emits]
other = "🌱 This page emits about <strong>{{ printf \"%.3f\" .gco2e }}g</strong> of CO₂ per visit"

